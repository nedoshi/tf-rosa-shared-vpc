rbac:
  enabled: true
  adminGroups:
    - cluster-admins
    - platform-admins

monitoring:
  enabled: true

networking:
  enabled: true
  defaultDenyAll: true

security:
  enabled: true
  # Namespaces to patch with pod security labels (e.g. default, system namespaces)
  podSecurityPatchNamespaces:
    - default

namespaces:
  enabled: true
  list:
    - shared-services
    - monitoring-custom
    - logging
    - security
    - platform
