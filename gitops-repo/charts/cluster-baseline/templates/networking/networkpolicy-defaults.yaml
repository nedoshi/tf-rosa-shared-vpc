{{- if and .Values.networking.enabled .Values.networking.defaultDenyAll }}
{{- range .Values.namespaces.list }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ . }}
  labels:
    {{- include "cluster-baseline.labels" $ | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
{{- end }}
{{- end }}
