{{- if .Values.machineConfig.journald.enabled }}
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: {{ include "rosa-platform-config.fullname" . }}-journald
  labels:
    machineconfiguration.openshift.io/role: worker
spec:
  config:
    ignition:
      version: 3.2.0
      config: {}
    storage:
      files:
        - path: /etc/systemd/journald.conf.d/50-journald.conf
          mode: 0644
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,{{ printf "[Journal]\nSystemMaxUse=%s\nSystemKeepFree=%s\nMaxRetentionSec=%d\n" .Values.machineConfig.journald.systemMaxUse .Values.machineConfig.journald.systemKeepFree .Values.machineConfig.journald.maxRetentionSec | b64enc }}
{{- end }}
