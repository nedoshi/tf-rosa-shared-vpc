{{- if .Values.storage.enabled }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storage.className }}
  {{- if .Values.storage.isDefault }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
provisioner: {{ .Values.storage.provisioner }}
parameters:
  skuname: {{ .Values.storage.skuName }}
  fsType: {{ .Values.storage.fsType | default "ext4" }}
reclaimPolicy: {{ .Values.storage.reclaimPolicy | default "Delete" }}
volumeBindingMode: {{ .Values.storage.volumeBindingMode | default "WaitForFirstConsumer" }}
allowVolumeExpansion: {{ .Values.storage.allowVolumeExpansion | default true }}
{{- end }}
