---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-baseline-helm
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: all-production
        requeueAfterSeconds: 180
  template:
    metadata:
      name: '{{ .clusterName }}-baseline'
    spec:
      project: platform
      source:
        repoURL: https://github.com/your-org/gitops-repo.git
        targetRevision: main
        path: charts/cluster-baseline
        helm: {}
      destination:
        server: '{{ .clusterServer }}'
        name: '{{ .clusterName }}'
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-rosa-overlay-helm
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: rosa-production
        requeueAfterSeconds: 180
  template:
    metadata:
      name: '{{ .clusterName }}-rosa-overlay'
    spec:
      project: platform
      source:
        repoURL: https://github.com/your-org/gitops-repo.git
        targetRevision: main
        path: charts/rosa-platform-config
        helm:
          valueFiles:
            - ../../cluster-values/rosa/{{ .clusterName }}.yaml
      destination:
        server: '{{ .clusterServer }}'
        name: '{{ .clusterName }}'
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
