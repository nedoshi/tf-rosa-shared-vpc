---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: rosa-production
  namespace: openshift-gitops
spec:
  clusterSets:
    - rosa-clusters
  numberOfClusters: null
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            env: production
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: aro-production
  namespace: openshift-gitops
spec:
  clusterSets:
    - aro-clusters
  numberOfClusters: null
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            env: production
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: all-production
  namespace: openshift-gitops
spec:
  clusterSets:
    - production-clusters
  numberOfClusters: null
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: rosa-eu
  namespace: openshift-gitops
spec:
  clusterSets:
    - rosa-clusters
  numberOfClusters: null
  predicates:
