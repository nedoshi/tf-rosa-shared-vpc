---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: disallow-privileged-containers
  namespace: policies
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: Security
    policy.open-cluster-management.io/controls: PR.AC-4
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: disallow-privileged
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: mustnothave
              objectDefinition:
                apiVersion: v1
                kind: Pod
                spec:
                  containers:
                    - name: "*"
                      securityContext:
                        privileged: true
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: Policy
        metadata:
          name: disallow-privileged-containers
        spec:
          remediationAction: enforce
