---
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: encryption-at-rest
  namespace: policies
  annotations:
    policy.open-cluster-management.io/standards: NIST-CSF
    policy.open-cluster-management.io/categories: Compliance
    policy.open-cluster-management.io/controls: PR.DS-1
spec:
  remediationAction: inform
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: encryption-at-rest-storage
        spec:
          remediationAction: inform
          severity: medium
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: storage.k8s.io/v1
                kind: StorageClass
                metadata:
                  name: encrypted
                parameters:
                  encryption: "true"
  object-templates:
    - complianceType: musthave
      objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: Policy
        metadata:
          name: encryption-at-rest
        spec:
          remediationAction: inform
